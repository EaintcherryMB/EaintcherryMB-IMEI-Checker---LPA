<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMEI Status Checker</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #004a99; font-size: 1.2rem; margin-bottom: 20px; text-align: center; }
        input { width: 94%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
        button { width: 100%; padding: 12px; background-color: #004a99; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
        button:hover { background-color: #003366; }
        #result { margin-top: 20px; display: none; }
        .status-item { display: flex; align-items: center; margin-bottom: 10px; font-weight: bold; }
        .check-icon { color: green; margin-right: 10px; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>Check IMEI Status</h2>
    <input type="text" id="imeiInput" placeholder="IMEI နံပါတ် ၁၅ လုံး ရိုက်ထည့်ပါ" maxlength="15">
    <button onclick="checkStatus()">Check Status</button>

    <div id="result">
        <div class="status-item"><span class="check-icon">✔</span> IMEI Status: <span style="color: green; margin-left: 5px;">Correct</span></div>
        <div class="status-item"><span class="check-icon">✔</span> Tax Payment Status: <span style="color: green; margin-left: 5px;">Paid</span></div>
        <div class="status-item"><span class="check-icon">✔</span> Device Blocking Status: <span style="color: green; margin-left: 5px;">Allowed</span></div>
        <p style="color: #666; font-size: 0.85rem; text-align: center; margin-top: 15px;">သင့်ဖုန်းသည် Register လုပ်ပြီးသား ဖြစ်ပါသည်။</p>
    </div>
</div>

<script>
    function checkStatus() {
        const imei = document.getElementById('imeiInput').value;
        if (imei.length < 15) {
            alert("ကျေးဇူးပြု၍ IMEI နံပါတ် ၁၅ လုံး ပြည့်အောင် ရိုက်ထည့်ပါ။");
            return;
        }
        // ဒီနေရာမှာ ပုံစံပြရန်အတွက် Result ကို ဖော်ပြပေးတာဖြစ်ပါတယ်။
        document.getElementById('result').style.display = 'block';
    }
</script>

</body>
</html>
